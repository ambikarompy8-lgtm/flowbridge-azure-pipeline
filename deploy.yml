name: Deploy FlowBridge Azure Pipeline

# Triggers: push to main OR manual run from GitHub Actions tab
on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "sql/**"
      - "pipelines/**"
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  AZURE_FUNCTIONAPP_NAME: fn-flowbridge-transform
  AZURE_FUNCTIONAPP_PACKAGE_PATH: functions/transform_contacts
  PYTHON_VERSION: "3.11"
  RESOURCE_GROUP: rg-flowbridge-pipeline
  ADF_NAME: adf-flowbridge-pipeline

jobs:
  # ── job 1: run tests ───────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/requirements.txt
          pip install pytest

      - name: Run transform tests
        run: pytest functions/tests/ -v

  # ── job 2: deploy function (runs only if tests pass) ──────────────────
  deploy-function:
    runs-on: ubuntu-latest
    needs: test   # blocks deploy if tests fail
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}  # set in GitHub repo → Settings → Secrets

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  # ── job 3: publish ADF pipelines ──────────────────────────────────────
  deploy-adf-pipelines:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF pipelines from JSON
        run: |
          for file in pipelines/*.json; do
            pipeline_name=$(basename "$file" .json)
            echo "Deploying pipeline: $pipeline_name"
            az datafactory pipeline create \
              --factory-name "$ADF_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --name "$pipeline_name" \
              --pipeline "@$file"
          done

      - name: Trigger test run
        run: |
          az datafactory pipeline create-run \
            --factory-name "$ADF_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --name "pl_ingest_contacts"

# ── how to set up secrets ─────────────────────────────────────────────────
# In your GitHub repo: Settings → Secrets and variables → Actions → New secret
#
# AZURE_CREDENTIALS:
#   az ad sp create-for-rbac \
#     --name "flowbridge-github-actions" \
#     --role contributor \
#     --scopes /subscriptions/YOUR_SUBSCRIPTION_ID/resourceGroups/rg-flowbridge-pipeline \
#     --json-auth
#   Copy the JSON output as the secret value.
#
# AZURE_FUNCTIONAPP_PUBLISH_PROFILE:
#   Azure Portal → Function App → Get publish profile → copy XML content
